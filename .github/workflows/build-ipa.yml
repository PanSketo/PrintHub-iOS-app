name: Build Filament Inventory IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Select latest available Xcode
        run: |
          ls /Applications/ | grep Xcode
          XCODE=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -switch /Applications/$XCODE
          xcodebuild -version

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${{ github.run_number }}" \
            iOS/FilamentInventory/Info.plist

      - name: Build archive (no code signing)
        run: |
          xcodebuild \
            -project iOS/FilamentInventory.xcodeproj \
            -scheme FilamentInventory \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FilamentInventory.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER=com.pansketo.filamentinventory \
            clean archive \
            | xcpretty || true
          test -d "$RUNNER_TEMP/FilamentInventory.xcarchive" && echo "✅ Archive created" || (echo "❌ Archive missing" && exit 1)

      - name: Package into IPA
        run: |
          APPS_DIR="$RUNNER_TEMP/FilamentInventory.xcarchive/Products/Applications"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APPS_DIR/FilamentInventory.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r FilamentInventory.ipa Payload/
          echo "✅ IPA size: $(du -sh FilamentInventory.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4.4.3
        with:
          name: FilamentInventory-v1.0-build${{ github.run_number }}
          path: ${{ runner.temp }}/FilamentInventory.ipa
          retention-days: 30
