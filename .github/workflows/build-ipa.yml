name: Build PrintHub IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Select latest available Xcode
        run: |
          ls /Applications/ | grep Xcode
          XCODE=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -switch /Applications/$XCODE
          xcodebuild -version

      - name: Stamp build number
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${{ github.run_number }}" \
            iOS/FilamentInventory/Info.plist
          echo "Build number: ${{ github.run_number }}"

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project iOS/FilamentInventory.xcodeproj \
            -scheme FilamentInventory \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/PrintHub.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean archive
          test -d "$RUNNER_TEMP/PrintHub.xcarchive" && echo "✅ Archive created" || (echo "❌ Archive missing" && exit 1)

      - name: Verify iOS widget is embedded
        run: |
          PLUGIN_DIR="$RUNNER_TEMP/PrintHub.xcarchive/Products/Applications/FilamentInventory.app/PlugIns"
          echo "Contents of PlugIns dir:"
          ls "$PLUGIN_DIR" || echo "⚠️ No PlugIns directory found"
          test -d "$PLUGIN_DIR/FilamentWidget.appex" && echo "✅ iOS widget embedded" || (echo "❌ iOS widget NOT embedded" && exit 1)

      - name: Package IPA (strip Watch app for Signulous/Sideloadly compatibility)
        run: |
          APP_PATH="$RUNNER_TEMP/PrintHub.xcarchive/Products/Applications/FilamentInventory.app"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          # Strip embedded Watch app — third-party re-signing tools cannot correctly
          # re-sign WatchKit companion entitlements, causing iOS to reject the install.
          rm -rf "$RUNNER_TEMP/Payload/FilamentInventory.app/Watch"
          echo "Watch app stripped"
          cd "$RUNNER_TEMP"
          zip -r PrintHub.ipa Payload/
          echo "✅ IPA size: $(du -sh PrintHub.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: PrintHub-v2.0-build${{ github.run_number }}
          path: ${{ runner.temp }}/PrintHub.ipa
          retention-days: 30
