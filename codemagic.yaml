workflows:
  ios-release:
    name: PrintHub - Build IPA
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_PROJECT: "iOS/FilamentInventory.xcodeproj"
        XCODE_SCHEME: "FilamentInventory"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show Xcode version
        script: |
          xcode-select -p
          xcodebuild -version

      - name: Stamp build number
        script: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            iOS/FilamentInventory/Info.plist
          echo "Build number: $BUILD_NUMBER"

      - name: Build archive (unsigned)
        script: |
          xcodebuild \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/PrintHub.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        script: |
          APP_PATH="$CM_BUILD_DIR/PrintHub.xcarchive/Products/Applications/FilamentInventory.app"
          echo "Found app: $APP_PATH"
          mkdir -p $CM_BUILD_DIR/Payload
          cp -r "$APP_PATH" $CM_BUILD_DIR/Payload/
          # Strip embedded Watch app — third-party re-signing tools (Signulous, Sideloadly)
          # cannot properly re-sign WatchKit companion entitlements, causing iOS to reject
          # the installation. The iOS app works fully without it.
          rm -rf "$CM_BUILD_DIR/Payload/FilamentInventory.app/Watch"
          echo "Watch app stripped from Payload"
          cd $CM_BUILD_DIR
          zip -r PrintHub.ipa Payload/
          echo "✅ IPA created:"
          ls -lh PrintHub.ipa

    artifacts:
      - $CM_BUILD_DIR/PrintHub.ipa
      - $CM_BUILD_DIR/PrintHub.xcarchive

    publishing:
      email:
        recipients:
          - $NOTIFY_EMAIL
        notify:
          success: true
          failure: true
